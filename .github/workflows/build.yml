name: build

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ilammy/msvc-dev-cmd@v1

      - name: build
        run: cl keyfix.cpp user32.lib winmm.lib

      - uses: actions/upload-artifact@v4
        with:
          name: keyfix
          path: keyfix.exe
